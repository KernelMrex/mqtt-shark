<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MQTT Shark</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="connect-screen" class="connect-screen">
      <section class="connect-card" aria-labelledby="connection-title">
        <div class="connect-brand">
          <h1 id="connection-title">MQTT Shark</h1>
          <span id="app-version" class="app-version">dev</span>
        </div>
        <form id="connection-form" class="connect-form">
          <label>
            Host-name
            <input id="broker-host" name="host" placeholder="localhost" autocomplete="hostname" required autofocus>
          </label>
          <label>
            Port
            <input id="broker-port" name="port" type="number" min="1" max="65535" value="1883" inputmode="numeric" required>
          </label>
          <button id="connect-button" type="submit">Connect</button>
          <p id="connect-feedback" class="feedback" role="status"></p>
        </form>
      </section>
    </main>

    <div id="app-shell" class="app-shell" hidden>
      <header class="topbar">
        <div class="broker-heading">
          <span class="eyebrow">Broker</span>
          <h1 id="broker-title">MQTT Shark</h1>
        </div>
        <div class="topbar-actions">
          <span id="status" class="status status-idle">idle</span>
          <button id="disconnect" type="button" class="secondary">Disconnect</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel topics-panel" aria-labelledby="topics-title">
          <div class="panel-heading">
            <div>
              <h2 id="topics-title">Discovered topics</h2>
              <p class="topics-meta">Observed through # discovery</p>
            </div>
            <button id="discover-topics" type="button" class="secondary compact">Discover</button>
          </div>
          <form id="subscribe-form" class="subscribe-form">
            <input id="subscribe-topic" placeholder="sensors/#" required>
            <div class="subscribe-actions">
              <select id="subscribe-qos" aria-label="Subscribe QoS">
                <option value="0">QoS 0</option>
                <option value="1">QoS 1</option>
                <option value="2">QoS 2</option>
              </select>
              <button type="submit">Subscribe</button>
            </div>
          </form>
          <ul id="topics-list" class="topics-list"></ul>
        </aside>

        <section class="panel payload-panel" aria-labelledby="payload-title">
          <div class="panel-heading payload-heading">
            <h2 id="payload-title">Payload</h2>
            <label class="payload-format-control">
              Format
              <select id="payload-format" aria-label="Payload format">
                <option value="auto">Auto</option>
                <option value="text">Text</option>
                <option value="json">JSON</option>
                <option value="xml">XML</option>
                <option value="binary">Binary</option>
                <option value="base64">Base64</option>
              </select>
            </label>
          </div>
          <div id="payload-meta" class="payload-meta" hidden></div>
          <div id="payload-empty" class="payload-empty">
            Select a message in Messages on the right
          </div>
          <pre id="payload-viewer" class="payload-viewer" hidden></pre>
        </section>

        <aside class="panel history-panel" aria-labelledby="messages-title">
          <div class="panel-heading">
            <div>
              <h2 id="messages-title">Messages</h2>
              <p id="history-meta" class="history-meta">Last 20 messages</p>
            </div>
            <button id="clear-messages" type="button" class="secondary compact">Clear</button>
          </div>
          <p id="app-feedback" class="feedback app-feedback" role="status"></p>
          <div id="messages" class="messages" aria-live="polite"></div>
        </aside>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
